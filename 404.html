<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tumara — Halaman Tidak Ditemukan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="assets/logo.png">
  <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons@7.4.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://cdn.jsdelivr.net/npm/ionicons@7.4.0/dist/ionicons/ionicons.js"></script>
  <script src="js/version-check.js"></script>
  <style>
    .nf-screen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .nf-card {
      width: 100%; max-width: 440px; text-align: center;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 28px; box-shadow: var(--shadow-lg);
      padding: 44px 30px;
      animation: fadeUp .5s ease both;
    }
    .nf-code {
      font-size: 4rem; font-weight: 800; letter-spacing: -.04em; line-height: 1;
      background: var(--grad-logo);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .nf-title { font-size: 1.2rem; font-weight: 800; margin-top: 12px; }
    .nf-sub { font-size: .88rem; color: var(--text-3); line-height: 1.65; margin: 8px auto 26px; max-width: 320px; }
    .nf-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

    @media (max-width: 860px) {
      .nf-screen { padding-bottom: 110px; } /* ruang untuk bottom nav */
    }
    @media (max-width: 420px) {
      .nf-actions { flex-direction: column; }
      .nf-actions .btn { width: 100%; }
    }
  </style>
</head>
<body>

  <div class="nf-screen">
    <div class="nf-card">
      <div class="logo-mark" style="margin:0 auto 18px;width:54px;height:54px;"><img src="assets/logo.png" alt="Logo Tumara"></div>
      <div class="nf-code">404</div>
      <div class="nf-title" data-en="Page not found">Halaman tidak ditemukan</div>
      <p class="nf-sub" data-en="The address you opened doesn't exist or has moved. Let's head back and continue your day with Tumara.">Alamat yang kamu buka tidak ada atau sudah dipindahkan. Yuk kembali dan lanjutkan harimu bersama Tumara.</p>
      <div class="nf-actions">
        <a class="btn" href="index.html"><ion-icon name="home-outline"></ion-icon> <span data-en="Go Home">Ke Beranda</span></a>
        <a class="btn btn-primary" href="app.html"><ion-icon name="apps-outline"></ion-icon> <span data-en="Open App">Buka Aplikasi</span></a>
      </div>
      <button class="btn" id="langBtn" style="margin-top:14px;padding:8px 12px;font-size:1.05rem;" title="Bahasa / Language"><ion-icon name="language-outline"></ion-icon></button>
    </div>
  </div>

  <!-- Bottom nav (muncul otomatis di layar ≤860px via style.css) -->
  <nav class="bottom-nav">
    <a class="bnav-item" href="index.html"><ion-icon name="home-outline"></ion-icon><span data-en="Home">Beranda</span></a>
    <a class="bnav-item" href="auth.html"><ion-icon name="person-circle-outline"></ion-icon><span data-en="Sign in">Masuk</span></a>
  </nav>

  <script src="js/i18n.js"></script>
  <script>
    document.documentElement.dataset.theme = localStorage.getItem('tumara_theme') || 'light';
    document.getElementById('langBtn').onclick = () => I18N.toggle();
  </script>
</body>
</html>
