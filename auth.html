<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tumara — Masuk / Daftar</title>
  <meta name="description" content="Masuk atau daftar akun Tumara — pendamping harian siswa.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%2310b981'/><stop offset='1' stop-color='%238b5cf6'/></linearGradient></defs><rect width='100' height='100' rx='24' fill='url(%23g)'/><text x='50' y='68' font-size='52' font-family='Arial' font-weight='bold' fill='white' text-anchor='middle'>T</text></svg>">
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
  <style>
    .back-home {
      position: fixed; top: 22px; left: 26px; z-index: 10;
      display: inline-flex; align-items: center; gap: 7px;
      font-family: var(--font); font-size: .85rem; font-weight: 700;
      color: var(--text-2); text-decoration: none;
      padding: 9px 16px; border-radius: 99px;
      background: var(--surface); border: 1px solid var(--border);
      box-shadow: var(--shadow-sm); transition: transform .15s, box-shadow .2s;
    }
    .back-home:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
  </style>
</head>
<body>

  <a class="back-home" href="index.html"><ion-icon name="arrow-back"></ion-icon> Kembali ke beranda</a>

  <!-- ============ LAYAR AUTH ============ -->
  <div id="authScreen" class="auth-screen">
    <div class="auth-card" id="authCard"><!-- diisi oleh JS --></div>
  </div>

  <!-- Modal & Toast root -->
  <div id="modalRoot"></div>
  <div id="toastRoot" class="toast-root"></div>

  <script src="js/firebase-config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/db.js"></script>
  <script src="js/views/auth.js"></script>
  <script>
    // Bootstrap halaman auth: sudah login → langsung ke aplikasi.
    document.addEventListener('DOMContentLoaded', async () => {
      const tema = localStorage.getItem('tumara_theme') || 'light';
      document.documentElement.dataset.theme = tema;
      try {
        const u = await DB.init();
        if (u) { location.replace('app.html'); return; }
      } catch (e) {
        toast('Gagal terhubung ke server. Periksa koneksi internetmu.', 'error');
      }
      AuthView.render();
    });
  </script>
</body>
</html>
