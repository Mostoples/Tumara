<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tumara — Offline</title>
  <meta name="theme-color" content="#059669">
  <link rel="icon" type="image/png" href="assets/logo.png">
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; margin: 0; }
    body {
      min-height: 100dvh; display: grid; place-items: center; padding: 24px;
      font: 400 16px/1.5 "Plus Jakarta Sans", system-ui, -apple-system, sans-serif;
      background: #f8fafc; color: #0f172a; text-align: center;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #0b1120; color: #e2e8f0; }
      .card { background: #111827; }
    }
    .card {
      max-width: 380px; width: 100%; background: #fff; border-radius: 22px;
      padding: 34px 26px; box-shadow: 0 18px 50px rgba(2, 8, 20, .12);
    }
    img { width: 68px; height: 68px; border-radius: 16px; margin-bottom: 18px; }
    h1 { font-size: 1.3rem; font-weight: 800; letter-spacing: -.01em; }
    p { color: #64748b; margin-top: 10px; font-size: .95rem; }
    @media (prefers-color-scheme: dark) { p { color: #94a3b8; } }
    button {
      margin-top: 22px; border: 0; cursor: pointer; width: 100%;
      padding: 13px 18px; border-radius: 13px; font: 700 15px/1 inherit;
      color: #fff; background: linear-gradient(135deg, #10b981, #059669);
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="assets/logo.png" alt="Tumara">
    <h1>Kamu sedang offline</h1>
    <p>Tumara butuh koneksi internet untuk memuat data terbaru. Cek koneksimu, lalu coba lagi ya. 🌱</p>
    <button onclick="location.reload()">Coba Lagi</button>
  </div>
</body>
</html>
