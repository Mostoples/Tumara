<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tumara — Pilih Pekerjaan</title>
  <meta name="description" content="Pilih pekerjaanmu agar Tumara bisa disesuaikan dengan kebutuhanmu.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <script>document.documentElement.dataset.theme = localStorage.getItem('tumara_theme') || 'light';</script>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="assets/logo.png">
  <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons@7.4.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://cdn.jsdelivr.net/npm/ionicons@7.4.0/dist/ionicons/ionicons.js"></script>
  <script src="js/version-check.js"></script>
  <style>
    .lang-btn {
      position: fixed; top: 22px; right: 26px; z-index: 10;
      display: inline-flex; align-items: center; justify-content: center;
      width: 42px; height: 42px; border-radius: 50%;
      font-size: 1.25rem; color: var(--text-2); cursor: pointer;
      background: var(--surface); border: 1px solid var(--border);
      box-shadow: var(--shadow-sm); transition: transform .15s, box-shadow .2s;
    }
    .lang-btn:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
    @media (max-width: 860px) { .lang-btn { top: 14px; right: 14px; width: 38px; height: 38px; } }
  </style>
</head>
<body>

  <button class="lang-btn" id="langBtn" title="Bahasa / Language"><ion-icon name="language-outline"></ion-icon></button>

  <div class="job-screen"><div id="jobRoot"></div></div>

  <div id="modalRoot"></div>
  <div id="toastRoot" class="toast-root"></div>

  <script src="js/i18n.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/firebase-config-trial.js"></script>
  <script src="js/trial-auth.js"></script>
  <script src="js/views/job-select.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      document.getElementById('langBtn').onclick = () => {
        I18N.toggle();
        JobSelectView.render(TrialAuth.user);
      };
      let user = null;
      try { user = await TrialAuth.init(); } catch (_) { user = null; }
      if (!user) return location.replace('register.html');
      JobSelectView.render(user);
    });
  </script>
</body>
</html>
