<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tumara — Masuk</title>
  <meta name="description" content="Masuk ke Tumara atau buat akun baru dengan email &amp; kata sandi atau Google.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <script>document.documentElement.dataset.theme = localStorage.getItem('tumara_theme') || 'light';</script>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="assets/logo.png">
  <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons@7.4.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://cdn.jsdelivr.net/npm/ionicons@7.4.0/dist/ionicons/ionicons.js"></script>
  <script src="js/version-check.js"></script>
  <style>
    .back-home {
      position: fixed; top: 22px; left: 26px; z-index: 10;
      display: inline-flex; align-items: center; gap: 7px;
      font-family: var(--font); font-size: .85rem; font-weight: 700;
      color: var(--text-2); text-decoration: none;
      padding: 9px 16px; border-radius: 99px;
      background: var(--surface); border: 1px solid var(--border);
      box-shadow: var(--shadow-sm); transition: transform .15s, box-shadow .2s;
    }
    .back-home:hover { transform: translateY(-2px); box-shadow: var(--shadow); }

    .lang-btn {
      position: fixed; top: 22px; right: 26px; z-index: 10;
      display: inline-flex; align-items: center; justify-content: center;
      width: 42px; height: 42px; border-radius: 50%;
      font-size: 1.25rem; color: var(--text-2); cursor: pointer;
      background: var(--surface); border: 1px solid var(--border);
      box-shadow: var(--shadow-sm); transition: transform .15s, box-shadow .2s;
    }
    .lang-btn:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
    @media (max-width: 860px) { .lang-btn { top: 14px; right: 14px; width: 38px; height: 38px; } }

    @media (max-width: 860px) {
      .back-home { top: 14px; left: 14px; padding: 8px 14px; font-size: .8rem; }
      .auth-screen { padding: 72px 18px 110px; }
    }

    /* ---- Tombol Google & pemisah "atau" (khusus halaman daftar) ---- */
    .btn-google {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 12px 18px; border-radius: 14px;
      background: var(--surface); border: 1px solid var(--border);
      font-family: var(--font); font-size: .92rem; font-weight: 700; color: var(--text);
      cursor: pointer; transition: transform .15s, box-shadow .2s, border-color .2s;
    }
    .btn-google:hover { transform: translateY(-1px); box-shadow: var(--shadow-sm); border-color: var(--text-3); }
    .btn-google svg { width: 19px; height: 19px; flex-shrink: 0; }

    .af-divider { display: flex; align-items: center; gap: 12px; margin: 22px 0; color: var(--text-3); font-size: .8rem; }
    .af-divider::before, .af-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  </style>
</head>
<body>

  <a class="back-home" href="index.html"><ion-icon name="arrow-back"></ion-icon> <span data-en="Back to home">Kembali ke beranda</span></a>
  <button class="lang-btn" id="langBtn" title="Bahasa / Language"><ion-icon name="language-outline"></ion-icon></button>

  <!-- ============ LAYAR DAFTAR / MASUK ============ -->
  <div id="authScreen" class="auth-screen">
    <div class="auth-card" id="authCard"><!-- diisi oleh JS --></div>
  </div>

  <!-- Modal & Toast root -->
  <div id="modalRoot"></div>
  <div id="toastRoot" class="toast-root"></div>

  <script src="js/i18n.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/firebase-config-umum.js"></script>
  <script src="js/umum-auth.js"></script>
  <script src="js/views/register.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const tema = localStorage.getItem('tumara_theme') || 'light';
      document.documentElement.dataset.theme = tema;
      document.getElementById('langBtn').onclick = () => {
        I18N.toggle();
        RegisterView.render();
      };
      // Sudah login sebelumnya? Langsung lanjut ke pekerjaan/beranda.
      try {
        const u = await UmumAuth.init();
        if (u) return RegisterView.goNext(u);
      } catch (_) { /* belum login — lanjut tampilkan form */ }
      RegisterView.render();
    });
  </script>
</body>
</html>
