<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tumara — Aplikasi Umum</title>
  <meta name="description" content="Tumara untuk umum: kesehatan, produktivitas, ibadah, dan keuangan dalam satu tempat, buat siapa saja di luar sekolah.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
  <script>document.documentElement.dataset.theme = localStorage.getItem('tumara_theme') || 'light';</script>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="assets/logo.png">
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#059669">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Tumara">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons@7.4.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://cdn.jsdelivr.net/npm/ionicons@7.4.0/dist/ionicons/ionicons.js"></script>
  <script src="js/version-check.js"></script>
  <script src="js/pwa.js"></script>
</head>
<body>

  <!-- ============ SHELL APLIKASI ============ -->
  <div id="appShell" class="app-shell no-bnav hidden">

    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-mark"><img src="assets/logo.png" alt="Logo Tumara"></div>
        <div>
          <div class="logo-text">Tumara</div>
          <div class="logo-tag">Tumbuh &amp; seimbang</div>
        </div>
      </div>

      <nav class="sidebar-nav" id="sidebarNav">
        <a class="nav-link" data-route="dashboard"><ion-icon name="grid-outline"></ion-icon><span data-en="Home">Beranda</span></a>
        <a class="nav-link" data-route="health"><ion-icon name="heart-outline"></ion-icon><span data-en="Health">Kesehatan</span></a>
        <a class="nav-link" data-route="tugas"><ion-icon name="checkbox-outline"></ion-icon><span data-en="Tasks">Tugas</span></a>
        <a class="nav-link" data-route="catatan"><ion-icon name="document-text-outline"></ion-icon><span data-en="Notes">Catatan</span></a>
        <a class="nav-link" data-route="kebiasaan"><ion-icon name="repeat-outline"></ion-icon><span data-en="Habits">Kebiasaan</span></a>
        <a class="nav-link" data-route="jadwal"><ion-icon name="calendar-outline"></ion-icon><span data-en="Schedule">Jadwal</span></a>
        <a class="nav-link" data-route="fokus"><ion-icon name="timer-outline"></ion-icon><span data-en="Focus">Fokus</span></a>
        <a class="nav-link" data-route="finance"><ion-icon name="wallet-outline"></ion-icon><span data-en="Finance">Keuangan</span></a>
        <a class="nav-link" data-route="ibadah"><ion-icon name="moon-outline"></ion-icon><span data-en="Worship">Ibadah</span></a>
        <a class="nav-link" data-route="profile"><ion-icon name="person-outline"></ion-icon><span data-en="Profile">Profil</span></a>
      </nav>

      <div class="sidebar-footer">
        <button class="theme-toggle" id="themeToggle" title="Ganti tema" data-en-title="Switch theme">
          <ion-icon name="moon-outline" id="themeIcon"></ion-icon>
          <span id="themeLabel">Mode gelap</span>
        </button>
        <div class="sidebar-user" id="sidebarUser"></div>
      </div>
    </aside>

    <main class="main-area">
      <header class="topbar">
        <!-- Di mobile sidebar disembunyikan & tidak ada bottom nav: tombol ini
             satu-satunya jalan pulang ke Beranda (hub menu), sama seperti guru.html. -->
        <button class="icon-btn nav-home-btn hidden" id="topHomeBtn" title="Beranda" data-en-title="Home">
          <ion-icon name="home-outline"></ion-icon>
        </button>
        <div class="topbar-titles">
          <h1 class="topbar-title" id="pageTitle">Beranda</h1>
          <div class="topbar-sub" id="pageSub"></div>
        </div>
        <div class="topbar-actions">
          <button class="icon-btn" id="topLangBtn" title="Bahasa / Language"><ion-icon name="language-outline"></ion-icon></button>
          <button class="icon-btn" id="topThemeBtn" title="Ganti tema" data-en-title="Switch theme"><ion-icon name="moon-outline"></ion-icon></button>
          <button class="avatar-btn" id="topAvatar" title="Profil" data-en-title="Profile"></button>
        </div>
      </header>
      <div class="view-wrap"><div id="view"></div></div>
    </main>
  </div>

  <!-- Modal & Toast root -->
  <div id="modalRoot"></div>
  <div id="toastRoot" class="toast-root"></div>

  <script src="js/firebase-config-umum.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/calc.js"></script>
  <script src="js/umum-auth.js"></script>
  <script src="js/umum-db.js"></script>
  <script src="js/views/job-select.js"></script>
  <script src="js/views/dashboard.js"></script>
  <script src="js/views/health.js"></script>
  <script src="js/views/productivity.js"></script>
  <script src="js/views/finance.js"></script>
  <script src="js/views/ibadah.js"></script>
  <script src="js/views/profile.js"></script>
  <script src="js/umum-app.js"></script>
</body>
</html>
